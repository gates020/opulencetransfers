<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Primo - Book your ride</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0a0a0a; 
            min-height: 100vh; 
            padding: 20px; 
            color: #ffffff;
        }
        .container { 
            background: #1a1a1a; 
            max-width: 620px; 
            margin: 0 auto; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            overflow: hidden; 
        }
        .header { 
            background: #000000; 
            padding: 25px 20px; 
            text-align: center; 
            border-bottom: 5px solid #d4af37;
            position: relative;
        }
        .header img {
            max-width: 280px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .lang-btn {
            position: absolute;
            top: 18px;
            right: 20px;
            background: #222;
            border: 2px solid #d4af37;
            color: #d4af37;
            font-size: 1.1rem;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lang-btn:hover {
            background: #d4af37;
            color: #000000;
            transform: scale(1.1);
        }

        .form-container { padding: 40px 30px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #d4af37;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #444;
            border-radius: 10px;
            font-size: 1.02rem;
            margin-bottom: 20px;
            background: #2a2a2a;
            color: #ffffff;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #d4af37;
            outline: none;
        }

        .payment-options {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .payment-options label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            padding: 16px 20px;
            border: 2px solid #444;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            user-select: none;
        }
        .payment-options label:hover {
            border-color: #666;
        }
        .payment-options input[type="radio"]:checked + span {
            border-color: #d4af37;
            background: #3a3a3a;
            color: #d4af37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
        }
        .payment-options input[type="radio"] {
            display: none;
        }

        .bagage-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .bagage-row > div {
            flex: 1;
        }

        .suggestions {
            max-height: 220px;
            overflow-y: auto;
            background: #2a2a2a;
            border: 2px solid #d4af37;
            border-radius: 10px;
            margin-top: -12px;
            margin-bottom: 20px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }
        .suggestions div {
            padding: 13px 15px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }
        .suggestions div:last-child { border-bottom: none; }
        .suggestions div:hover {
            background: #d4af37;
            color: #000000;
        }

        button {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 17px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { background: #1eb853; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://i.imgur.com/gMOgWpM.png" alt="Taxi Primo Logo">
        <button class="lang-btn" id="langToggle">🇬🇧</button>
    </div>
    
    <div class="form-container">
        <form id="bookingForm">
            <label id="label-naam">Your name</label>
            <input type="text" id="naam" placeholder="Enter your full name" required>

            <label id="label-van">Pickup address</label>
            <input type="text" id="van" placeholder="Type address or city..." autocomplete="off" required>
            <div id="vanSuggestions" class="suggestions"></div>

            <div style="display:flex; gap:15px;">
                <div style="flex:1;">
                    <label id="label-datum">Date</label>
                    <input type="date" id="datum" required>
                </div>
                <div style="flex:1;">
                    <label id="label-tijd">Time</label>
                    <input type="time" id="tijd" required>
                </div>
            </div>

            <label id="label-personen">Number of passengers</label>
            <select id="personen" required>
                <option value="1">1 passenger</option>
                <option value="2" selected>2 passengers</option>
                <option value="3">3 passengers</option>
                <option value="4">4+ passengers</option>
            </select>

            <div class="bagage-row">
                <div>
                    <label style="font-size:0.95rem; font-weight:500;" id="label-kleine">Small luggage</label>
                    <select id="kleine_bagage">
                        <option value="0">None</option>
                        <option value="1" selected>1 piece</option>
                        <option value="2">2 pieces</option>
                        <option value="3">3 pieces</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:0.95rem; font-weight:500;" id="label-grote">Large luggage</label>
                    <select id="grote_bagage">
                        <option value="0" selected>None</option>
                        <option value="1">1 piece</option>
                        <option value="2">2 pieces</option>
                    </select>
                </div>
            </div>

            <label id="label-telefoon">Phone number</label>
            <input type="tel" id="telefoon" placeholder="+31 6 12345678" required>

            <label id="label-opmerkingen">Remarks (optional)</label>
            <textarea id="opmerkingen" rows="3" placeholder="E.g. flight number, special requests..."></textarea>

            <label id="label-payment">Payment method</label>
            <div class="payment-options">
                <label>
                    <input type="radio" name="payment" value="Cash / Pin" checked>
                    <span>Cash / Pin 💵</span>
                </label>
                <label>
                    <input type="radio" name="payment" value="Credit Card">
                    <span>Credit Card 💳</span>
                </label>
            </div>

            <button type="submit" id="btn-boek">💬 Book via WhatsApp</button>
        </form>
    </div>
</div>

<script>
    let isEnglish = false;
    let pickupCoords = null;   // Opslaan van coördinaten

    const translations = {
        nl: { /* ...zelfde als eerder... */ },
        en: { /* ...zelfde als eerder... */ }
    };

    function switchLanguage() {
        // (zelfde als eerder)
        isEnglish = !isEnglish;
        const lang = isEnglish ? 'en' : 'nl';
        const t = translations[lang];
        // ... labels updaten ...
    }

    // Adres suggesties + coördinaten opslaan
    async function searchAddress(query, callback) {
        if (query.length < 3) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=nl&limit=8`);
            const data = await res.json();
            callback(data);
        } catch(e) {}
    }

    function showSuggestions(container, results, input) {
        container.innerHTML = '';
        container.style.display = results.length ? 'block' : 'none';

        results.forEach(place => {
            const div = document.createElement('div');
            div.textContent = place.display_name;
            div.onclick = () => {
                input.value = place.display_name;
                pickupCoords = { lat: place.lat, lon: place.lon };   // Coördinaten opslaan
                container.style.display = 'none';
            };
            container.appendChild(div);
        });
    }

    window.onload = () => {
        const vanInput = document.getElementById('van');
        const vanSug = document.getElementById('vanSuggestions');

        let timeout = null;
        vanInput.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                searchAddress(vanInput.value, data => showSuggestions(vanSug, data, vanInput));
            }, 300);
        });

        document.addEventListener('click', e => {
            if (!vanSug.contains(e.target) && e.target !== vanInput) {
                vanSug.style.display = 'none';
            }
        });

        document.getElementById('langToggle').addEventListener('click', switchLanguage);

        // WhatsApp verzending met klikbare coördinaten
        document.getElementById("bookingForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const ophaalAdres = document.getElementById("van").value.trim();

            let mapsLink = "";
            if (pickupCoords) {
                mapsLink = `https://www.google.com/maps/search/?api=1&query=${pickupCoords.lat},${pickupCoords.lon}`;
            } else {
                mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ophaalAdres)}`;
            }

            const kleine = parseInt(document.getElementById("kleine_bagage").value) || 0;
            const grote = parseInt(document.getElementById("grote_bagage").value) || 0;

            let bagageText = "";
            if (kleine > 0) bagageText += `${kleine} small`;
            if (grote > 0) bagageText += (bagageText ? " + " : "") + `${grote} large`;
            if (!bagageText) bagageText = "No luggage";

            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

            const bericht = `*🚕 New Booking - Opulence Transfers*\n\n` +
                `Name: ${document.getElementById("naam").value}\n` +
                `Pickup: ${ophaalAdres}\n` +
                `📍 Location: [Open in Google Maps](${mapsLink})\n` +
                `Date & Time: ${document.getElementById("datum").value} at ${document.getElementById("tijd").value}\n` +
                `Passengers: ${document.getElementById("personen").value}\n` +
                `Luggage: ${bagageText}\n` +
                `Payment: ${paymentMethod}\n` +
                `Phone: ${document.getElementById("telefoon").value}\n\n` +
                `${document.getElementById("opmerkingen").value ? "Remarks:\n" + document.getElementById("opmerkingen").value : ""}\n\n` +
                `Please confirm as soon as possible! 🙏`;

            window.open(`https://wa.me/31613028325?text=${encodeURIComponent(bericht)}`, "_blank");
        });
    };
</script>
</body>
</html>
